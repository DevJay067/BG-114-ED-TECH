<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPro — Smart Study Management</title>
  <meta name="description" content="StudyPro helps you plan study sessions, track goals, practice problems, and grow smarter every day.">

  <!-- Tailwind CSS via CDN -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <!-- Chart.js for Charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Lucide Icons via unpkg -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Firebase SDK (v10 modular via compat for CDN use) -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

  <!-- Firebase Config -->
  <script src="firebase-config.js"></script>
  
  <link rel="stylesheet" href="style.css">
  
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50 transition-colors duration-300 overflow-hidden">
  
  <div id="toast-container" class="toast-container"></div>
  
  <div id="root" class="h-screen w-screen overflow-hidden"></div>

  <script src="script.js"></script>
</body>
</html>
